---
- name: Install required packages
  yum:
    name: "{{ item }}"
    state: present
    disable_gpg_check: true
  with_items:
    - "/u01/app/postgres/lz4-1.8.3-3.el8.x86_64.rpm"
    - "/u01/app/postgres/openldap-clients-2.4.46-18.el8.x86_64.rpm"
    - "glibc"
    - "libxslt"
    - "python3-psycopg2"
  become: true

- find:
    paths: /home/nfs/balgroupit.com/pgbuild_S_Do_Not_Delete/
    recurse: true
    patterns: "*.sh"
  register: file_to_copy
  run_once: true

- name: set fact
  set_fact:
    all_files: "{{ file_to_copy.files | map(attribute='path') | list }}"

- name: change owner and group to postgres on all nodes
  become: true
  file:
    path: /home/postgres/bin/
    mode: '0775'
    recurse: yes
    owner: postgres
    group: postgres

#- name: copy the installation script from nfs to postgres directory
#  copy:
#    src: "{{ item }}"
#    dest: /home/postgres/bin/
#    remote_src: yes
#    directory_mode: yes
#    mode: 0775
#    owner: postgres
#    group: postgres
#  become_user: postgres
#  become: true
#  become_method: su
#  with_items: "{{ all_files }}"

- name: copy the installation script from nfs to postgres directory
  shell: "su - postgres -c 'cp {{ item }} /home/postgres/bin/'"
  become: true
  with_items: "{{ all_files }}"

- name: change owner and group to postgres on all nodes
  become: true
  file:
    path: /home/postgres/bin/
    mode: '0775'
    recurse: yes
    owner: postgres
    group: postgres

- name: change owner and group to postgres on all nodes
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0775'
    recurse: yes
  with_items:
    - "/var/log/postgres"
    - "/home/postgres/cfg"
    - "/home/postgres/wrk"
    - "/u01/app/postgres/pgsql-{{ pg_version }}"
    - "/u01/"
  register: file_out
  ignore_errors: yes

- name: execute the installation step for PGSQL
  shell: "/home/postgres/bin/pg_create_dirs_install_binaries.sh {{ pg_version }} install /u01/{{ cluster_name }}/pgdata"
  register: install_logs
  become: true

- name: set error msg
  debug:
    msg: error in installation of binaries
  when: install_logs is failed

