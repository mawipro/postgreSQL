- name: restarting postgresql
  service:
    name: postgresql-{{ pg_version }}.service
    enabled: yes
    state: started
  become: yes
  register: service_out

- name: set error msg
  set_fact:
    hdnErrorDescription_awx: "failed to enable router on secondary node"
  when: service_out is failed

- name: "Fail the task"
  fail:
    msg: failed to enable router on secondary node
  when: service_out is failed

- name: deamon reload
  become: true
  systemd:
    daemon_reload: yes
``