---
- name: 'PostgreSQL 17 Pre-Installation & OS Hardening'
  hosts: rhel_servers
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.12
    pg_version: "17"
    cluster_name: "main"
    domain_name: "sdxtest.local"

  tasks:
    # 1. IDENTITY & USER SETUP (Moved to top to prevent permission errors)
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ ansible_hostname }}.{{ domain_name }}"

    - name: Creating a postgres group
      ansible.builtin.group:
        name: postgres
        state: present
        gid: 909

    - name: Adding the postgres user with specific uid and gid
      ansible.builtin.user:
        name: postgres
        shell: /bin/bash
        home: /home/postgres
        uid: 909
        group: postgres
        skeleton: /etc/skel

    # 2. FIREWALL & SECURITY
    # Instead of disabling, we allow the DB port to keep it secure
    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    - name: Allow PostgreSQL port (5432)
      ansible.posix.firewalld:
        port: 5432/tcp
        permanent: yes
        state: enabled
        immediate: yes

    - name: Change SELinux to permissive
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    # 3. STORAGE & LVM MANAGEMENT (Optimized Check and Extend)
    # This replaces the shell/grep/awk commands with a single idempotent module
    - name: "Extend Root LV to 10GB if needed"
      community.general.lvol:
        vg: rhel_rhel8
        lv: root
        size: 10G
        resizefs: yes
      ignore_errors: true

    - name: "Extend Log LV to 5GB if needed"
      community.general.lvol:
        vg: rhel_rhel8
        lv: log
        size: 5G
        resizefs: yes
      ignore_errors: true

    # 4. DIRECTORY STRUCTURE
    - name: Create u01 and set ownership
      ansible.builtin.file:
        path: /u01
        state: directory
        owner: postgres
        group: postgres
        mode: '0755'

    - name: Create directory structure for PG Data and Archive
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
        owner: postgres
        group: postgres
        recurse: yes
      with_items:
        - "/u01/{{ cluster_name }}/archive"
        - "/u01/{{ cluster_name }}/pgdata"
        - "/home/postgres/bin/cfg"

    # 5. OS TUNING & LOGGING
    - name: Update rsyslog for PostgreSQL
      ansible.builtin.copy:
        content: |
          local0.*    /var/log/postgres.log
        dest: /etc/rsyslog.d/postgresql.conf
        mode: '0644'
      notify: restart rsyslog

    - name: Set overcommit_memory kernel parameter
      ansible.posix.sysctl:
        name: vm.overcommit_memory
        value: '2'
        state: present
        reload: yes

    # 6. USER ENVIRONMENT SETUP
    - name: Check for .bash_profile
      ansible.builtin.stat:
        path: '/home/postgres/.bash_profile'
      register: register_bash_profile

    - name: Copy bash skeleton files if missing
      ansible.builtin.copy:
        src: "/etc/skel/{{ item }}"
        dest: "/home/postgres/{{ item }}"
        remote_src: yes
        owner: postgres
        group: postgres
      with_items:
        - .bash_profile
        - .bashrc
      when: not register_bash_profile.stat.exists

    - name: Add PG binaries to PATH in .bash_profile
      ansible.builtin.lineinfile:
        path: '/home/postgres/.bash_profile'
        line: 'export PATH=$PATH:/usr/pgsql-{{ pg_version }}/bin'
        insertafter: EOF
      become_user: postgres

  handlers:
    - name: restart rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: restarted