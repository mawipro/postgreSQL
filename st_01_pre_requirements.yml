---
- name: 'PostgreSQL 17 Pre-Installation & OS Hardening'
  hosts: rhel_servers
  become: true
  vars:
    pg_version: "17"
    cluster_name: "main"
    domain_name: "sdxtest.local"

  tasks:
    # 1. IDENTITY & USER SETUP (Moved to top to prevent permission errors)
    - name: Set system hostname
      hostname:
        name: "{{ ansible_hostname }}.{{ domain_name }}"

    - name: Creating a postgres group
      group:
        name: postgres
        state: present
        gid: 909

    - name: Adding the postgres user with specific uid and gid
      user:
        name: postgres
        shell: /bin/bash
        home: /home/postgres
        uid: 909
        group: postgres
        skeleton: /etc/skel

