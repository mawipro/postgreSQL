---
- name: 'PostgreSQL 17 Pre-Installation & OS Hardening'
  hosts: rhel_servers
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.12
    pg_version: "17"
    cluster_name: "main"
    domain_name: "sdxtest.local"

  tasks:
    # 1. IDENTITY & USER SETUP (Moved to top to prevent permission errors)
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ ansible_hostname }}.{{ domain_name }}"

    - name: Creating a postgres group
      ansible.builtin.group:
        name: postgres
        state: present
        gid: 909

    - name: Adding the postgres user with specific uid and gid
      ansible.builtin.user:
        name: postgres
        shell: /bin/bash
        home: /home/postgres
        uid: 909
        group: postgres
        skeleton: /etc/skel

    # 2. FIREWALL & SECURITY
    # Instead of disabling, we allow the DB port to keep it secure
    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    - name: Allow PostgreSQL port (5432)
      ansible.posix.firewalld:
        port: 5432/tcp
        permanent: yes
        state: enabled
        immediate: yes

    - name: Change SELinux to permissive
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    # 3. STORAGE & LVM MANAGEMENT (Check Mounts)
    - name: Ensure specific PostgreSQL mount points exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: mount_points
      loop:
        - /u01/app/postgres
        - /u01/stead/pgdata
        - /u01/stead/johnrambo
        - /opt/fake

    - name: Assert mount points exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Mount point {{ item.item }} does not exist or is not a directory."
      loop: "{{ mount_points.results }}"

    # 4. DIRECTORY STRUCTURE & SYMLINKS
    - name: Create PostgreSQL Binaries target directory
      ansible.builtin.file:
        path: /u01/app/postgres/17
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Create PostgreSQL package symlink
      ansible.builtin.file:
        src: /u01/app/postgres/17
        dest: /usr/pgsql-17
        state: link

    - name: Create physical directories for PostgreSQL on LVMs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
        owner: postgres
        group: postgres
      loop:
        - /u01/stead/pgdata/data
        - /u01/stead/pgdata/pgtemp
        - /u01/stead/pgdata/pgwal
        - /u01/stead/archive/pgarchive
        - /u01/stead/archive/pglog

    - name: Create logical u01 structure
      ansible.builtin.file:
        path: "/u01/{{ cluster_name }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0755'
        recurse: yes

    - name: Create required symlinks for logical layout
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        owner: postgres
        group: postgres
      loop:
        - { src: '/u01/stead/pgdata/data', dest: '/u01/{{ cluster_name }}/pgdata' }
        - { src: '/u01/stead/pgdata/pgtemp', dest: '/u01/{{ cluster_name }}/pgtemp' }
        - { src: '/u01/stead/pgdata/pgwal', dest: '/u01/{{ cluster_name }}/pgwal' }
        - { src: '/u01/stead/archive/pgarchive', dest: '/u01/{{ cluster_name }}/pgarchive' }

    - name: Create scripts directory
      ansible.builtin.file:
        path: "/home/postgres/bin/cfg"
        state: directory
        mode: '0700'
        owner: postgres
        group: postgres
        recurse: yes

    # 5. OS TUNING & LOGGING
    - name: Update rsyslog for PostgreSQL
      ansible.builtin.copy:
        content: |
          local0.*    /u01/stead/archive/pglog/postgres.log
        dest: /etc/rsyslog.d/postgresql.conf
        mode: '0644'
      notify: restart rsyslog

    - name: Set overcommit_memory kernel parameter
      ansible.posix.sysctl:
        name: vm.overcommit_memory
        value: '2'
        state: present
        reload: yes

    # 6. USER ENVIRONMENT SETUP
    - name: Check for .bash_profile
      ansible.builtin.stat:
        path: '/home/postgres/.bash_profile'
      register: register_bash_profile

    - name: Copy bash skeleton files if missing
      ansible.builtin.copy:
        src: "/etc/skel/{{ item }}"
        dest: "/home/postgres/{{ item }}"
        remote_src: yes
        owner: postgres
        group: postgres
      loop:
        - .bash_profile
        - .bashrc
      when: not register_bash_profile.stat.exists

    - name: Add PG binaries to system-wide PATH
      ansible.builtin.copy:
        dest: /etc/profile.d/postgres.sh
        content: >
          export PATH=$PATH:/usr/pgsql-{{ pg_version }}/bin
        mode: '0644'

  handlers:
    - name: restart rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: restarted