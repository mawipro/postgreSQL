---

############################################################
#### Installing IPA client on the server
############################################################

- name: Fetching hostname
  shell: hostname -f
  register: host_name

- name: Distribution major version
  set_fact:
    os_version: "{{ ansible_distribution_major_version }}"

- name: print host OS environment details
  debug:
    msg: "{{ os_version }}"

############################################################
#### Verification if provided user group exists on IPA
############################################################

- name: Authenticate to IPA
  shell: "echo '{{ ipa_pass }}' | kinit {{ ipa_user }}"
  no_log: true

- name: validate if IPA user groups exists
  shell: "ipa group-find {{ item }}_external"
  register: group
  ignore_errors: true
  with_items: "{{ dba_group }}"

- name: ipa group external added
  ipa_group:
    name: "{{ item }}_external"
    external: yes
    group:
      - "{{ dba_group }}"
    ipa_host: "{{ ipa_host }}"
    ipa_user: "{{ ipa_user }}"
    ipa_pass: "{{ ipa_pass }}"
  when: group is failed
  no_log: true
  with_items: "{{ dba_group }}"

- name: ipa group added
  ipa_group:
    name: "{{ item }}"
    group:
      - "{{ dba_group }}_external"
    ipa_host: "{{ ipa_host }}"
    ipa_user: "{{ ipa_user }}"
    ipa_pass: "{{ ipa_pass }}"
  when: group is failed
  no_log: true
  with_items: "{{ dba_group }}"

- name: Add external user to external group
  shell: "ipa -n group-add-member {{ item }}_external --external {{ item }}@balgroupit.com"
  register: group_ad
  when: group is failed
  ignore_errors: true
  with_items: "{{ dba_group }}"

- name: validate if IPA user groups exists
  shell: "ipa group-find {{ item }}"
  register: group
  when: group is failed
  ignore_errors: true
  with_items: "{{ dba_group }}"

- name: Validate if HBAC and SUDO rules exists
  shell: "ipa group-show {{ item }}"
  register: group_show
  ignore_errors: true
  with_items: "{{ dba_group }}"

- name: Sudo group exists
  debug:
    msg: "{{ group_show.stdout_lines }}"
  when: "'SUDO' in group_show.stdout"

- name: HBAC group exists
  debug:
    msg: "{{ group_show.stdout_lines }}"
  when: "'HBAC' in group_show.stdout"

############################################################
#### Hostgroup configuration
############################################################

- name: add ipa hostgroup
  ipa_hostgroup:
    name: "{{ item }}"
    state: present
    ipa_host: "{{ ipa_host }}"
    ipa_user: "{{ ipa_user }}"
    ipa_pass: "{{ ipa_pass }}"
  ignore_errors: true
  no_log: true
  with_items: "{{ dba_group }}"

- name: Add group name
  shell: "ipa hostgroup-add-member {{ item }} --hosts={{ ansible_hostname }}"
  ignore_errors: true
  register: command_out
  with_items: "{{ dba_group }}"

- name: debug error msg
  debug:
    msg: "{{ dba_group }} already is a member of hostgroup {{ dba_group }}"
  when: "'This entry is already a member' in command_out.stdout"

############################################################
#### Cleanup and restart
############################################################

- name: Clean cache
  shell: /usr/sbin/sss_cache -E
  become: true

- name: restart sssd
  become: true
  systemd:
    name: sssd
    state: restarted
``