---

- name: Check if the archive exists
  stat:
    path: /tmp/pg_data/pgomocoh.zip
  register: archive_stat
  delegate_to: localhost
  run_once: true
  become: true

- name: Clone repository from Bitbucket
  git:
    repo: 'https://bitbucket.balgroupit.com/scm/pgomcoh/pgomocoh.git'
    dest: '/tmp/pg_data'
    clone: yes
    archive: "/tmp/pg_data/pgomocoh.zip"
    update: yes
  delegate_to: localhost
  run_once: true
  register: download_result
  become: true

- name: Ensure target directory exists
  file:
    path: /home/postgres/pg_cohesity
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'
  become: true

- name: copy file
  copy:
    src: "/tmp/pg_data/pgomocoh.zip"
    dest: "/home/postgres/pg_cohesity"
  become: yes

- name: Ensure target directory exists again
  file:
    path: /home/postgres/pg_cohesity
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'
  become: true

- name: Unzip the archive
  unarchive:
    src: /home/postgres/pg_cohesity/pgomocoh.zip
    dest: /home/postgres/pg_cohesity
    remote_src: yes
  become: true

- name: Set permissions for the directory
  file:
    path: /home/postgres/pg_cohesity
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'
    recurse: yes
  become: true

- name: Create symlink for pre-freeze-script
  file:
    src: /home/postgres/pg_cohesity/pre-freeze-script
    dest: /usr/sbin/pre-freeze-script
    state: link
  become: true

- name: Create symlink for post-thaw-script
  file:
    src: /home/postgres/pg_cohesity/post-thaw-script
    dest: /usr/sbin/post-thaw-script
    state: link
  become: true

- name: block to move and update tools.conf file
  become: true
  block:

    - name: copy tools.conf file from one location to another in target server
      copy:
        src: /home/postgres/pg_cohesity/tools.conf.CH-0016842
        dest: /etc/vmware-tools/tools.conf.CH-0016842
        remote_src: true

    - name: update archive_dir in tools.conf
      replace:
        path: /etc/vmware-tools/tools.conf.CH-0016842
        regexp: '\{\{ archive_dir \}\}'
        replace: "/u01/{{ cluster_name }}/archive"
      become: true

    - name: update hostname in tools.conf
      replace:
        path: /etc/vmware-tools/tools.conf.CH-0016842
        regexp: '<hostname>'
        replace: "{{ ansible_hostname }}"
      become: true

- name: Ensure cron job for PostgreSQL is present
  cron:
    name: "MyCloud PostgreSQL transaction generation"
    user: postgres
    job: "/home/postgres/pg_cohesity/pg_gen_txn > /var/log/postgres/pg_gen_txn.log 2>&1"
    minute: "*/1"
    hour: "*"
    day: "*"
    month: "*"
    weekday: "*"
  become: true