---

- include_tasks: 06-01-01_file_transfer.yml

- name: generate token on cohesity
  uri:
    url: "https://{{ cohesity_url }}.balgroupit.com/v2/access-tokens"
    body:
      username: "{{ cohesity_user }}"
      password: "{{ cohesity_pass }}"
      domain: "{{ domain }}"
    follow_redirects: all
    method: POST
    status_code: [201]
    body_format: json
    validate_certs: false
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
  register: access_token
  delegate_to: localhost
  no_log: true

- name: token filter
  set_fact:
    token: "{{ access_token.json.accessToken }}"

#############################################################

- name: block to fetch storageDomain
  block:

    - name: list viewbox
      uri:
        url: "https://{{ cohesity_url }}.balgroupit.com/v2/storage-domains"
        follow_redirects: all
        method: GET
        validate_certs: false
        status_code: [200]
        timeout: 600
        headers:
          Authorization: "Bearer {{ token }}"
          Accept: "application/json"
      register: list_viewbox
      delegate_to: localhost
      run_once: true

    - debug:
        msg: "{{ list_viewbox }}"

    - name: setfact viewbox id
      set_fact:
        viewboxID: "{{ list_viewbox.json.storageDomains | selectattr('name', '==', 'DefaultStorageDomain') | list }}"

    - debug:
        msg: "{{ viewboxID[0] | json_query('id') }}"

    - set_fact:
        id: "{{ viewboxID[0].id | int }}"

#############################################################

- name: list protection jobs on cohesity
  uri:
    url: "https://{{ cohesity_url }}/v2/data-protect/protection-groups"
    follow_redirects: all
    method: GET
    status_code: [200]
    timeout: 600
    validate_certs: false
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ token }}"
      Accept: "application/json"
  register: pg_details
  delegate_to: localhost

- set_fact:
    vm_env: "{{ server_env | upper }}"

- name: making vault value for PG
  set_fact:
    vault_value: >-
      {% if vm_env == 'DEV' %}-
      {% elif vm_env == 'TEST' %}-
      {% elif vm_env == 'QA' %}-
      {% elif vm_env == 'ACC' %}-
      {% elif vm_env == 'INT' %}-
      {% elif vm_env == 'PROD' %}Vault
      {% else %}na
      {% endif %}

- name: making vc dc variable
  set_fact:
    vc_dc: "{{ dc }}"

- name: fetch the list of protection jobs which match the conditions
  set_fact:
    pg_logic_generation: >-
      {{
        pg_details.json.protectionGroups
        | selectattr('name', 'match',
          cohesity_url ~ '_' ~ 'PGSQL-SA-NFS' ~ '_' ~ vc_dc ~ '_' ~ vault_value ~ '_' ~ '\\d+-Mins_\\d+$')
        | list
      }}

- name: protection group id
  set_fact:
    existing_pg_id: "{{ pg_logic_generation[0].id }}"

- name: fetch protection group details with ID on cohesity
  uri:
    url: "https://{{ cohesity_url }}/v2/data-protect/protection-groups/{{ existing_pg_id }}"
    follow_redirects: all
    method: GET
    status_code: [200]
    timeout: 600
    validate_certs: false
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ token }}"
      Accept: "application/json"
  register: group_detail
  delegate_to: localhost

- name: create view with EXISTING PG
  uri:
    url: "https://{{ cohesity_url }}.balgroupit.com/v2/file-services/views"
    follow_redirects: all
    method: POST
    validate_certs: false
    status_code: [201]
    timeout: 600
    body: "{{ lookup('template', 'view.json.j2') }}"
    body_format: json
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ token }}"
      Accept: "application/json"
  register: create_view
  delegate_to: localhost
  ignore_errors: true

- set_fact:
    viewID: "{{ create_view.json.viewId | int }}"

#############################################################

- name: Update objects and viewNameConfigList in viewParams
  set_fact:
    final_updated_json: >-
      {{
        group_detail.json | combine({
          'viewParams': {
            'objects': group_detail.json.viewParams.objects + [
              {'id': viewID | int, 'name': view_name}
            ],
            'replicationParams': {
              'viewNameConfigList':
                group_detail.json.viewParams.replicationParams.viewNameConfigList + [
                  {'sourceViewId': viewID | int, 'useSameViewName': true}
                ]
            }
          }
        }, recursive=True)
      }}

- debug:
    msg: "{{ final_updated_json }}"

- name: update pg with new servers
  register: final_reg
  delegate_to: localhost
  uri:
    url: "https://{{ cohesity_url }}/v2/data-protect/protection-groups/{{ existing_pg_id }}"
    follow_redirects: all
    method: PUT
    body_format: json
    validate_certs: false
    body: "{{ final_updated_json }}"
    status_code: [200]
    timeout: 600
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ token }}"
      Accept: "application/json"

- debug:
    msg: "{{ final_reg }}"

#############################################################

- name: Replace part of a string
  set_fact:
    updated_nfs_path: "{{ cohesity_url }}-{{ vlan }}.balgroupit.com:/{{ view_name }}"

- name: block to run for unmount and mount
  block:

    - name: create a file
      file:
        path: "/u01/{{ instance_name }}/archive"
        state: directory
        mode: "0600"
        owner: postgres
        group: postgres
        recurse: true
      become: true

    - name: mount nfs for archive to the server
      mount:
        src: "{{ updated_nfs_path }}"
        path: "/u01/{{ instance_name }}/archive"
        opts: defaults
        state: mounted
        fstype: nfs
      become: true

    - name: changing permission of archive path
      file:
        path: "/u01/{{ instance_name }}/archive"
        state: directory
        mode: 0755
        recurse: true
        owner: postgres
        group: postgres
      become: true

  when: create_view != ""

- set_fact:
    hdnNFS_Name: "{{ nfs_view_name }}"
``