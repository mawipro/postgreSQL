################ POSTGRES.CONF updates are managed at Venafi level asa single point of updating the configuration #######

- name: new script for mempry setting automation run as user postgres
  become_user: postgres
  become: yes
  shell: './pg_memory_setting_changes.sh /u01/{{ cluster_name }}/pgdata'
  args:
    chdir: '/home/postgres/bin'

- name: new script for memory setting automation run as user postgres
  become_user: postgres
  become: true
  shell: './pg_logging_setup.sh /u01/{{ cluster_name }}/pgdata'
  args:
    chdir: '/home/postgres/bin'

