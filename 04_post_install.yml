- name: restarting postgresql
  service:
    name: postgresql-{{ pg_version }}.service
    enabled: yes
    state: restarted
  become: yes
  register: service_out

##-------------DIM integration script setup-------------------

- name: install open_ldap
  become: true
  shell: 'yum install /home/nfs/balgroupit.com/pgbuild_S_Do_Not_Delete/open_ldap/openldap* -y'

- name: change owner of bin folder to postgres
  become: true
  file:
    path: '/home/postgres/bin'
    owner: postgres
    group: postgres
    mode: '0777'
    recurse: yes

#######################################################################

######## Fetching new Ldap /PAM script ########################

- name: Clone, Transfer, and Execute Script Playbook
  block:

    - name: Clone repository from Bitbucket
      git:
        repo: 'https://bitbucket.balgroupit.com/scm/pgpam/pgpam.git'
        dest: '/tmp/pgpam{{ cr_number }}'
        clone: yes
        archive: "/tmp/pgpam{{ cr_number }}/pg_pam_ldap.zip"
        update: yes
      delegate_to: localhost

    - name: Transfer cloned repository to target server
      file:
        path: '{{ pamdest }}'
        state: directory
        mode: 0755
        group: postgres
        owner: postgres
      become: true

    - name: copy file
      copy:
        src: "/tmp/pgpam{{ cr_number }}/pg_pam_ldap.zip"
        dest: "{{ pamdest }}"
      become: yes

    - name: unzip file
      unarchive:
        src: "{{ pamdest }}/pg_pam_ldap.zip"
        dest: "{{ pamdest }}"
        remote_src: yes
      run_once: true
      become: yes

    - name: create directory
      become: yes
      file:
        path: "{{ item }}"
        state: directory
        owner: postgres
        group: postgres
        mode: 0755
      register: pamdir
      loop:
        - "{{ pamdest }}"
        - "{{ pamdest }}/template"

    - name: Set files setting
      become: yes
      file:
        path: "{{ pamdest }}"
        owner: postgres
        group: postgres
        mode: 0755
        recurse: yes

    - name: disable LDAP SYNC job
      become: yes
      become_user: postgres
      cron:
        name: "{{ syncText }}"
        disabled: yes
        job: "{{ syncJob }}"
      register: cronldap

    - name: create PAM SYNC job
      become: yes
      become_user: postgres
      cron:
        name: "{{ pamText }}"
        minute: "*/30"
        job: "{{ pamJob }}"
      register: cronsync

- name: crontab creation
  cron:
    name: "MyCloud MANAGED: ROLE GRANT JOB "
    minute: "*/30"
    job: "/home/postgres/bin/pg_new_schema_role_grant_privs.sh {{ cluster_name }} > /var/log/postgres/pg_new_schema_role_grant_privs.log"
  become_user: "postgres "
  become: yes

- name: crontab creation
  cron:
    name: "MyCloud MANAGED: REVOKE UNEXPECTED PREVILAGES"
    minute: "*/45"
    job: "/home/postgres/bin/pg_check_revoke_unexpected_privs.sh {{ cluster_name }} > /var/log/postgres/pg_revoke_unexpected_grant_privs.log"
  become_user: "postgres "
  become: yes

- name: set fact for cluster env
  set_fact:
    env_db: "test_efm"
  when: db_env != 'PROD'

- name: set fact for cluster env
  set_fact:
    env_db: "prod_efm"
  when: db_env == 'PROD'

- name: run script for hba setup
  become_user: postgres
  become: true
  shell: './pg_hba_setup.sh {{ db_name }} {{ env_db }} {{ cluster_name }}'
  args:
    chdir: '/home/postgres/bin'

########## Enabling Log rotation

- name: Install the latest version of logrotate
  yum:
    name: "{{ item }}"
    state: present
  with_items:
    - logrotate
  become: true

- name: deploy the log rotation for pgsql
  copy:
    src: "logrotate_conf.j2"
    dest: "/etc/logrotate.d/postgres"
    mode: "0644"
  become: true

- name: update permission for /var/log/postgres folder
  file:
    path: /var/log/postgres/
    mode: 0750
    state: directory
    owner: postgres
    group: postgres
    recurse: true
  become: true

- name: Execute ondemand log rotation for postgres
  shell: logrotate -f /etc/logrotate.d/postgres
  become: true

